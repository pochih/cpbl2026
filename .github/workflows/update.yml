name: Update CPBL data

# 每日自動更新 CPBL 賽程 / 戰績 / 先發投手 / 先發打序
# 台灣時間每天多次更新（先發投手通常賽前一日公布、先發打序賽前約 1 小時公布）
on:
  schedule:
    # UTC 時間；下列大致對應台灣 08:00 / 13:00 / 17:00 / 21:00 / 23:00
    - cron: "0 0,5,9,13,15 * * *"
  workflow_dispatch: {}   # 允許手動觸發

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install requests

      - name: Fetch CPBL data
        run: python fetch_cpbl.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cpbl_data.json
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "chore: update CPBL data ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          fi
